<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Estoque — Visão Geral — Painel Admin</title>
<script>document.documentElement.dataset.theme=localStorage.getItem('alfa_theme')||'dark';</script>
<link rel="stylesheet" href="admin.css">
<style>
.egrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:26px;}
.ecard{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:18px 20px;box-shadow:var(--shadow-sm);transition:transform .15s var(--ease);}
.ecard:hover{transform:translateY(-2px);}
.ecard-lbl{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:8px;}
.ecard-val{font-size:23px;font-weight:800;color:var(--text-main);}
.ecard-val.warn{color:var(--warning);}
.ecard-val.danger{color:var(--danger);}
.ecard-val.ok{color:var(--success);}

.two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:20px;margin-bottom:20px;}
@media(max-width:1000px){.two-col{grid-template-columns:1fr;}}
.card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:22px 24px;box-shadow:var(--shadow-sm);}
.card-title{font-size:14px;font-weight:800;margin-bottom:14px;}

.mov-chart{display:flex;align-items:flex-end;gap:8px;height:150px;padding-top:10px;}
.mov-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:2px;}
.mov-bars{display:flex;align-items:flex-end;gap:2px;height:100%;}
.mov-bar-in{width:8px;background:var(--success);border-radius:2px 2px 0 0;}
.mov-bar-out{width:8px;background:var(--danger);border-radius:2px 2px 0 0;}
.mov-lbl{font-size:9.5px;color:var(--text-muted);margin-top:4px;}
.mov-legend{display:flex;gap:16px;font-size:11.5px;color:var(--text-secondary);margin-bottom:6px;}
.mov-legend span{display:inline-flex;align-items:center;gap:5px;}
.mov-legend i{width:9px;height:9px;border-radius:2px;display:inline-block;}

.tp-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border-color);font-size:12.5px;}
.tp-row:last-child{border-bottom:none;}
.tp-row-name{flex:1;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tp-row-val{font-weight:700;color:var(--text-main);}
</style>
</head>
<body>

<div class="admin-shell">
  <div id="admin-sidebar-mount"></div>
  <div class="admin-main">
    <div class="admin-topbar">
      <div class="admin-topbar-title">Estoque — Visão Geral</div>
      <div class="admin-topbar-actions">
        <div id="dateRangeMount" style="display:flex;gap:6px;"></div>
        <a class="btn btn-primary" href="admin-estoque.html">Ver itens em estoque</a>
      </div>
    </div>
    <div class="admin-content">
      <div class="admin-insight-bar" id="admin-insight-bar" style="display:none"></div>

      <div class="egrid" id="egrid"></div>

      <div class="two-col">
        <div class="card">
          <div class="card-title">Movimentação — <span id="movRangeLbl"></span></div>
          <div class="mov-legend"><span><i style="background:var(--success)"></i> Entradas</span><span><i style="background:var(--danger)"></i> Saídas</span></div>
          <div class="mov-chart" id="movChart"></div>
        </div>
        <div class="card">
          <div class="card-title">Itens mais vendidos no período</div>
          <div id="topSold"></div>
        </div>
      </div>

      <div class="two-col">
        <div class="card">
          <div class="card-title">Itens parados (sem venda no período)</div>
          <div id="stalled"></div>
        </div>
        <div class="card">
          <div class="card-title">Últimas movimentações</div>
          <div id="recentMov"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-client.js"></script>
<script src="admin-shell.js"></script>
<script src="admin-daterange.js"></script>
<script>
let currentRange = null;
const MOV_LABELS = { entrada_manual:'Entrada manual', saida_manual:'Saída manual', venda:'Venda', cancelamento:'Cancelamento', reposicao:'Reposição', ajuste:'Ajuste' };

function fmtBRL(v) { return 'R$ ' + Number(v || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }
function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const min = Math.floor(diff / 60000);
  if (min < 1) return 'agora';
  if (min < 60) return 'há ' + min + ' min';
  const h = Math.floor(min / 60);
  if (h < 24) return 'há ' + h + 'h';
  return 'há ' + Math.floor(h / 24) + ' dias';
}

function ecard(lbl, val, cls) {
  return `<div class="ecard"><div class="ecard-lbl">${lbl}</div><div class="ecard-val ${cls || ''}">${val}</div></div>`;
}

async function loadDashboard() {
  if (!currentRange) return;
  const since = currentRange.start, until = currentRange.end;

  const [prodRes, movRes, itemsRes] = await Promise.all([
    window.sb.from('products').select('id,name,stock,min_stock,cost_price,active'),
    window.sb.from('estoque_movimentacoes').select('product_id,tipo,quantidade,motivo,created_at').gte('created_at', since.toISOString()).lte('created_at', until.toISOString()).order('created_at', { ascending: false }),
    window.sb.from('order_items').select('order_id,product_id,product_name_snapshot,qty,orders(created_at,status)'),
  ]);

  const products = prodRes.data || [];
  const movs = movRes.data || [];
  const items = itemsRes.data || [];

  const active = products.filter(p => p.active);
  const noStock = products.filter(p => p.stock <= 0);
  const lowStock = products.filter(p => p.stock > 0 && p.stock <= p.min_stock);
  const valorTotal = products.reduce((s, p) => s + (p.stock > 0 ? p.stock * Number(p.cost_price || 0) : 0), 0);
  const valorMedio = active.length ? valorTotal / active.length : 0;
  const repostos = new Set(movs.filter(m => m.tipo === 'reposicao' || m.tipo === 'entrada_manual').map(m => m.product_id)).size;

  document.getElementById('egrid').innerHTML = [
    ecard('Total de produtos', products.length),
    ecard('Produtos ativos', active.length, 'ok'),
    ecard('Sem estoque', noStock.length, noStock.length ? 'danger' : ''),
    ecard('Estoque baixo', lowStock.length, lowStock.length ? 'warn' : ''),
    ecard('Repostos no período', repostos),
    ecard('Valor total em estoque', fmtBRL(valorTotal)),
    ecard('Valor médio por produto', fmtBRL(valorMedio)),
  ].join('');

  renderMovChart(movs, since, until);
  renderTopSold(items, since, until);
  renderStalled(products, items, since, until);
  renderRecentMov(movs);
}

function renderMovChart(movs, since, until) {
  document.getElementById('movRangeLbl').textContent = currentRange.label;
  const spanDays = Math.min(30, Math.round((until - since) / 86400000) + 1);
  const days = [];
  for (let i = spanDays - 1; i >= 0; i--) {
    const d = new Date(until.getTime() - i * 86400000);
    days.push({ key: d.toISOString().slice(0, 10), lbl: d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }), inQty: 0, outQty: 0 });
  }
  movs.forEach(m => {
    const key = m.created_at.slice(0, 10);
    const day = days.find(d => d.key === key);
    if (!day) return;
    if (m.quantidade > 0) day.inQty += m.quantidade;
    else day.outQty += Math.abs(m.quantidade);
  });
  const max = Math.max(...days.map(d => Math.max(d.inQty, d.outQty)), 1);
  const showEvery = days.length > 14 ? Math.ceil(days.length / 14) : 1;
  document.getElementById('movChart').innerHTML = days.map((d, i) => `
    <div class="mov-col">
      <div class="mov-bars">
        <div class="mov-bar-in" style="height:${d.inQty / max * 120}px" title="Entradas: ${d.inQty}"></div>
        <div class="mov-bar-out" style="height:${d.outQty / max * 120}px" title="Saídas: ${d.outQty}"></div>
      </div>
      <span class="mov-lbl">${i % showEvery === 0 ? d.lbl : ''}</span>
    </div>`).join('');
}

function renderTopSold(items, since, until) {
  const totals = {};
  items.forEach(it => {
    if (!it.orders || !it.orders.created_at) return;
    const t = new Date(it.orders.created_at);
    if (t < since || t > until || it.orders.status === 'cancelado') return;
    const key = it.product_id;
    totals[key] = totals[key] || { name: it.product_name_snapshot, qty: 0 };
    totals[key].qty += it.qty;
  });
  const top = Object.values(totals).sort((a, b) => b.qty - a.qty).slice(0, 8);
  const el = document.getElementById('topSold');
  el.innerHTML = top.length ? top.map(t => `<div class="tp-row"><span class="tp-row-name">${t.name}</span><span class="tp-row-val">${t.qty} un.</span></div>`).join('')
    : '<div class="table-empty">Nenhuma venda no período.</div>';
}

function renderStalled(products, items, since, until) {
  const soldIds = new Set();
  items.forEach(it => {
    if (!it.orders || !it.orders.created_at) return;
    const t = new Date(it.orders.created_at);
    if (t >= since && t <= until && it.orders.status !== 'cancelado') soldIds.add(it.product_id);
  });
  const stalled = products.filter(p => p.active && p.stock > 0 && !soldIds.has(p.id)).slice(0, 8);
  const el = document.getElementById('stalled');
  el.innerHTML = stalled.length ? stalled.map(p => `<div class="tp-row"><span class="tp-row-name">${p.name}</span><span class="tp-row-val" style="color:var(--text-muted);">${p.stock} em estoque</span></div>`).join('')
    : '<div class="table-empty">Todos os produtos ativos tiveram venda no período. 🎉</div>';
}

function renderRecentMov(movs) {
  const el = document.getElementById('recentMov');
  const recent = movs.slice(0, 8);
  el.innerHTML = recent.length ? recent.map(m => `
    <div class="tp-row">
      <span class="tp-row-name">${MOV_LABELS[m.tipo] || m.tipo}${m.motivo ? ' — ' + m.motivo : ''}</span>
      <span class="tp-row-val" style="color:${m.quantidade >= 0 ? 'var(--success)' : 'var(--danger)'};">${m.quantidade > 0 ? '+' : ''}${m.quantidade}</span>
    </div>`).join('') : '<div class="table-empty">Nenhuma movimentação no período.</div>';
}

(async function () {
  const session = await AdminShell.init('estoque-dashboard');
  if (!session) return;
  AdminDateRange.mount(document.getElementById('dateRangeMount'), (range) => {
    currentRange = range;
    loadDashboard();
  }, { initialKey: '30d' });
})();
</script>
</body>
</html>
