<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard — Painel Admin</title>
<script>document.documentElement.dataset.theme=localStorage.getItem('alfa_theme')||'dark';</script>
<link rel="stylesheet" href="admin.css">
<style>
.charts-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:20px;margin-bottom:20px;}
@media(max-width:1000px){.charts-grid{grid-template-columns:1fr;}}

.bar-chart{display:flex;align-items:flex-end;gap:10px;height:180px;padding-top:10px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:6px;}
.bar-fill{width:100%;max-width:34px;background:var(--primary);position:relative;transition:height .3s;}
.bar-fill::after{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--primary);}
.bar-val{font-size:10.5px;color:var(--text-muted);white-space:nowrap;}
.bar-lbl{font-size:10.5px;color:var(--text-muted);margin-top:4px;}

.hbar-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.hbar-lbl{width:150px;flex-shrink:0;font-size:12px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hbar-track{flex:1;background:var(--bg-main);height:16px;position:relative;}
.hbar-fill{height:100%;background:var(--primary);}
.hbar-val{width:50px;flex-shrink:0;font-size:11.5px;color:var(--text-muted);text-align:right;}

.status-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:12.5px;}
.status-dot{width:9px;height:9px;flex-shrink:0;}
.status-row-lbl{flex:1;color:var(--text-secondary);}
.status-row-val{font-weight:700;}

.lowstock-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-color);font-size:12.5px;}
.lowstock-row:last-child{border-bottom:none;}

.period-tabs{display:flex;gap:6px;}
.period-tabs button{padding:7px 14px;border:1px solid var(--border-color);background:var(--bg-card);color:var(--text-secondary);font-size:11.5px;font-weight:700;cursor:pointer;}
.period-tabs button.active{background:var(--primary);color:#fff;border-color:var(--primary);}
</style>
</head>
<body>

<div class="admin-shell">
  <div id="admin-sidebar-mount"></div>
  <div class="admin-main">
    <div class="admin-topbar">
      <div class="admin-topbar-title">Dashboard</div>
      <div class="period-tabs" id="periodTabs">
        <button data-days="7" class="active">7 dias</button>
        <button data-days="30">30 dias</button>
        <button data-days="90">90 dias</button>
      </div>
    </div>
    <div class="admin-content">
      <div class="admin-insight-bar" id="admin-insight-bar" style="display:none"></div>

      <div class="metrics-grid" id="metricsGrid"></div>

      <div class="charts-grid">
        <div class="card">
          <div class="card-title" id="revChartTitle">Receita — últimos 7 dias</div>
          <div class="bar-chart" id="revChart"></div>
        </div>
        <div class="card">
          <div class="card-title">Pedidos por Status</div>
          <div id="statusChart"></div>
        </div>
      </div>

      <div class="charts-grid">
        <div class="card">
          <div class="card-title">Produtos Mais Vendidos</div>
          <div id="topProductsChart"></div>
        </div>
        <div class="card">
          <div class="card-title">Estoque Baixo / Sem Estoque</div>
          <div id="lowStockList"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-client.js"></script>
<script src="admin-shell.js"></script>
<script>
const STATUS_LABELS = { aguardando_pagamento:'Aguardando Pagamento', pago:'Pago', preparando:'Em Preparação', enviado:'Em Transporte', entregue:'Entregue', cancelado:'Cancelado' };
const STATUS_HEX = { aguardando_pagamento:'#F59E0B', pago:'#0066FF', preparando:'#0066FF', enviado:'#0066FF', entregue:'#16A34A', cancelado:'#D71920' };
let periodDays = 7;

function fmtBRL(v) { return 'R$ ' + Number(v || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }

function metricCard(lbl, val, sub) {
  return `<div class="metric-card"><div class="metric-lbl">${lbl}</div><div class="metric-val">${val}</div>${sub ? `<div class="metric-sub">${sub}</div>` : ''}</div>`;
}

async function loadDashboard() {
  const since = new Date(Date.now() - periodDays * 86400000).toISOString();
  const startOfToday = new Date(); startOfToday.setHours(0,0,0,0);
  const startOfMonth = new Date(); startOfMonth.setDate(1); startOfMonth.setHours(0,0,0,0);

  const [ordersRes, allOrdersRes, productsRes, clientsRes, itemsRes] = await Promise.all([
    window.sb.from('orders').select('id,total,status,created_at').gte('created_at', since),
    window.sb.from('orders').select('id,total,status,created_at'),
    window.sb.from('products').select('id,name,stock,min_stock,active'),
    window.sb.from('profiles').select('id', { count: 'exact', head: true }).eq('role', 'cliente'),
    window.sb.from('order_items').select('product_id,product_name_snapshot,qty,order_id,orders(created_at,status)'),
  ]);

  const orders = ordersRes.data || [];
  const allOrders = allOrdersRes.data || [];
  const products = productsRes.data || [];
  const items = itemsRes.data || [];

  // Receita só conta pedidos realmente pagos — "aguardando_pagamento" é venda
  // pendente, ainda não é receita de verdade, e cancelado nunca conta.
  const isPaid = o => !['aguardando_pagamento', 'cancelado'].includes(o.status);
  const isPending = o => o.status === 'aguardando_pagamento';

  const revenueToday = allOrders.filter(o => isPaid(o) && new Date(o.created_at) >= startOfToday).reduce((s,o) => s + Number(o.total), 0);
  const revenueMonth = allOrders.filter(o => isPaid(o) && new Date(o.created_at) >= startOfMonth).reduce((s,o) => s + Number(o.total), 0);
  const paidOrders = allOrders.filter(isPaid);
  const ticketMedio = paidOrders.length ? paidOrders.reduce((s,o) => s + Number(o.total), 0) / paidOrders.length : 0;
  const pendingOrders = allOrders.filter(isPending);
  const pendingTotal = pendingOrders.reduce((s,o) => s + Number(o.total), 0);
  const lowStock = products.filter(p => p.stock > 0 && p.stock <= p.min_stock);
  const noStock = products.filter(p => p.stock <= 0);

  document.getElementById('metricsGrid').innerHTML = [
    metricCard('Receita Hoje', fmtBRL(revenueToday)),
    metricCard('Receita do Mês', fmtBRL(revenueMonth)),
    metricCard('Vendas Pendentes', pendingOrders.length, pendingOrders.length ? fmtBRL(pendingTotal) + ' aguardando pagamento' : 'Nenhuma'),
    metricCard('Pedidos (' + periodDays + 'd)', orders.length),
    metricCard('Ticket Médio', fmtBRL(ticketMedio)),
    metricCard('Clientes', clientsRes.count || 0),
    metricCard('Produtos', products.length, (lowStock.length + noStock.length) + ' com estoque baixo/zerado'),
  ].join('');

  renderRevenueChart(orders);
  renderStatusChart(orders);
  renderTopProducts(items, since);
  renderLowStock(lowStock, noStock);
}

function renderRevenueChart(orders) {
  document.getElementById('revChartTitle').textContent = 'Receita — últimos ' + periodDays + ' dias';
  const days = [];
  for (let i = periodDays - 1; i >= 0; i--) {
    const d = new Date(Date.now() - i * 86400000);
    days.push({ key: d.toISOString().slice(0,10), lbl: d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' }), total: 0 });
  }
  orders.forEach(o => {
    if (o.status === 'aguardando_pagamento' || o.status === 'cancelado') return;
    const key = o.created_at.slice(0,10);
    const day = days.find(d => d.key === key);
    if (day) day.total += Number(o.total);
  });
  const max = Math.max(...days.map(d => d.total), 1);
  const showEvery = periodDays > 14 ? Math.ceil(periodDays / 14) : 1;

  document.getElementById('revChart').innerHTML = days.map((d, i) => `
    <div class="bar-col">
      <span class="bar-val">${d.total > 0 ? fmtBRL(d.total).replace('R$ ','') : ''}</span>
      <div class="bar-fill" style="height:${Math.max(d.total / max * 140, 2)}px" title="${d.lbl}: ${fmtBRL(d.total)}"></div>
      ${i % showEvery === 0 ? `<span class="bar-lbl">${d.lbl}</span>` : '<span class="bar-lbl"></span>'}
    </div>`).join('');
}

function renderStatusChart(orders) {
  const counts = {};
  Object.keys(STATUS_LABELS).forEach(k => counts[k] = 0);
  orders.forEach(o => { counts[o.status] = (counts[o.status] || 0) + 1; });
  const max = Math.max(...Object.values(counts), 1);
  document.getElementById('statusChart').innerHTML = Object.entries(STATUS_LABELS).map(([key, label]) => `
    <div class="status-row">
      <span class="status-dot" style="background:${STATUS_HEX[key]}"></span>
      <span class="status-row-lbl">${label}</span>
      <span class="status-row-val">${counts[key]}</span>
    </div>
    <div class="hbar-track" style="margin-bottom:8px;"><div class="hbar-fill" style="width:${counts[key]/max*100}%;background:${STATUS_HEX[key]}"></div></div>
  `).join('');
}

function renderTopProducts(items, since) {
  const totals = {};
  items.forEach(i => {
    if (!i.orders || i.orders.created_at < since) return;
    if (i.orders.status === 'cancelado') return;
    const key = i.product_id;
    totals[key] = totals[key] || { name: i.product_name_snapshot, qty: 0 };
    totals[key].qty += i.qty;
  });
  const top = Object.values(totals).sort((a,b) => b.qty - a.qty).slice(0, 6);
  const el = document.getElementById('topProductsChart');
  if (!top.length) { el.innerHTML = '<div class="table-empty">Nenhuma venda no período.</div>'; return; }
  const max = Math.max(...top.map(t => t.qty), 1);
  el.innerHTML = top.map(t => `
    <div class="hbar-row">
      <span class="hbar-lbl" title="${t.name}">${t.name}</span>
      <div class="hbar-track"><div class="hbar-fill" style="width:${t.qty/max*100}%"></div></div>
      <span class="hbar-val">${t.qty} un.</span>
    </div>`).join('');
}

function renderLowStock(lowStock, noStock) {
  const el = document.getElementById('lowStockList');
  const list = [...noStock.map(p => ({ ...p, tag: 'Sem estoque', color: 'red' })), ...lowStock.map(p => ({ ...p, tag: 'Estoque baixo', color: 'amber' }))].slice(0, 8);
  if (!list.length) { el.innerHTML = '<div class="table-empty">Nenhum produto com estoque baixo. 🎉</div>'; return; }
  el.innerHTML = list.map(p => `
    <div class="lowstock-row">
      <span>${p.name}</span>
      <span class="status-pill ${p.color}">${p.tag} (${p.stock})</span>
    </div>`).join('');
}

document.getElementById('periodTabs').addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  periodDays = Number(btn.dataset.days);
  document.querySelectorAll('#periodTabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadDashboard();
});

(async function () {
  const session = await AdminShell.init('dashboard');
  if (!session) return;
  await loadDashboard();
})();
</script>
</body>
</html>
