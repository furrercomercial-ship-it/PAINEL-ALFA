<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard — Painel Admin</title>
<script>document.documentElement.dataset.theme=localStorage.getItem('alfa_theme')||'dark';</script>
<link rel="stylesheet" href="admin.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* Paleta/gradiente já vivem em admin.css (compartilhado com o painel
   inteiro) — aqui só o que é específico desta tela. */
#admin-insight-bar{display:none !important;}
/* O sino já mora no topbar desta página (perto do banner de pedidos
   pendentes) — não precisa do sino flutuante duplicado por cima. */
.notif-fab{display:none !important;}
/* O painel de notificações é pensado pra "subir" a partir de um sino
   flutuante lá embaixo (admin.css) — aqui o sino é lá em cima, então o
   painel precisa "descer" a partir dele em vez de flutuar no rodapé. */
.notif-panel{top:64px;bottom:auto;right:40px;max-height:min(600px, calc(100vh - 100px));}
@media(max-width:480px){.notif-panel{right:12px;}}

/* ── util ── */
.dash-content{padding:40px 40px 100px;max-width:1600px;margin:0 auto;}
@media(max-width:900px){.dash-content{padding:24px 18px 80px;}}
.dash-section{margin-bottom:32px;}
.dfade{animation:dashIn .35s var(--ease) both;}
@keyframes dashIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── card base premium ── */
.dcard{
  background:linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,0) 40%), var(--bg-card);
  border:1px solid var(--border-soft);
  border-radius:16px;
  padding:24px;
  box-shadow:0 1px 1px rgba(0,0,0,.2), 0 16px 40px -20px rgba(0,0,0,.55);
  transition:transform .2s var(--ease), box-shadow .2s var(--ease), border-color .2s var(--ease);
}
.dcard:hover{transform:translateY(-2px);box-shadow:0 1px 1px rgba(0,0,0,.2), 0 22px 50px -18px rgba(0,0,0,.6);border-color:rgba(255,255,255,.1);}
[data-theme="light"] .dcard{box-shadow:0 1px 2px rgba(16,24,40,.04), 0 16px 32px -20px rgba(16,24,40,.15);}
.dcard-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;}
.dcard-title{font-size:14.5px;font-weight:700;letter-spacing:-.1px;color:var(--text-main);}
.dcard-sub{font-size:11.5px;color:var(--text-muted);margin-top:2px;}
.dcard-link{font-size:12px;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:4px;transition:gap .15s;}
.dcard-link:hover{gap:7px;}

.dgrid-2{display:grid;grid-template-columns:1.5fr 1fr;gap:24px;margin-bottom:32px;align-items:stretch;}
@media(max-width:1080px){.dgrid-2{grid-template-columns:1fr;}}

/* ═══ TOPBAR ═══ */
.dash-topbar{display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;padding:16px 40px !important;}
@media(max-width:900px){.dash-topbar{padding:14px 18px !important;}}
.dash-topbar-title{font-size:19px;font-weight:800;letter-spacing:-.3px;color:var(--text-main);}
.dash-topbar-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
.dash-topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

.period-tabs{display:flex;gap:3px;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:10px;padding:3px;}
.period-tabs button{padding:7px 13px;border:none;background:transparent;color:var(--text-muted);font-size:11.5px;font-weight:700;cursor:pointer;border-radius:7px;transition:all .18s var(--ease);}
.period-tabs button.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.4);}
.period-tabs button:not(.active):hover{color:var(--text-main);background:rgba(255,255,255,.05);}

.dash-search{position:relative;display:flex;align-items:center;}
.dash-search svg{position:absolute;left:12px;color:var(--text-muted);width:14px;height:14px;pointer-events:none;z-index:1;}
.dash-search input{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:10px;padding:8px 12px 8px 34px;font-size:12px;color:var(--text-main);outline:none;width:170px;transition:width .2s var(--ease),border-color .2s;}
.dash-search input:focus{width:240px;border-color:var(--primary);}
@media(max-width:1200px){.dash-search{display:none;}}

.dash-search-results{position:absolute;top:calc(100% + 8px);left:0;width:340px;max-height:420px;overflow-y:auto;background:var(--bg-card-2);border:1px solid var(--border-soft);border-radius:12px;box-shadow:0 20px 44px -14px rgba(0,0,0,.5);z-index:200;display:none;padding:6px;}
.dash-search-results.open{display:block;}
.dsr-group-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);padding:9px 10px 4px;}
.dsr-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;cursor:pointer;transition:background .12s;}
.dsr-item:hover{background:rgba(255,255,255,.05);}
.dsr-item-ic{width:26px;height:26px;border-radius:8px;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dsr-item-ic svg{width:13px;height:13px;}
.dsr-item-txt{flex:1;min-width:0;}
.dsr-item-main{font-size:12px;font-weight:600;color:var(--text-main);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dsr-item-sub{font-size:10.5px;color:var(--text-muted);}
.dsr-empty{padding:20px 10px;text-align:center;font-size:12px;color:var(--text-muted);}

.dash-icon-btn{position:relative;width:36px;height:36px;border-radius:10px;background:var(--bg-card);border:1px solid var(--border-soft);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s var(--ease);}
.dash-icon-btn:hover{color:var(--text-main);border-color:rgba(255,255,255,.16);transform:translateY(-1px);}
.dash-icon-btn svg{width:16px;height:16px;}
.dash-badge{position:absolute;top:-4px;right:-4px;background:var(--danger);color:#fff;font-size:9.5px;font-weight:800;min-width:16px;height:16px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 3px;border:2px solid var(--bg-header);}

.dash-quickbtn{font-size:12px !important;padding:9px 15px !important;border-radius:10px !important;}

.dash-profile{display:flex;align-items:center;gap:9px;padding:5px 12px 5px 5px;border-radius:12px;background:var(--bg-card);border:1px solid var(--border-soft);cursor:pointer;transition:border-color .18s;}
.dash-profile:hover{border-color:rgba(255,255,255,.16);}
.dash-avatar{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--primary),var(--violet));color:#fff;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:800;flex-shrink:0;}
.dash-profile-name{font-size:12px;font-weight:700;color:var(--text-main);line-height:1.3;}
.dash-profile-role{font-size:10px;color:var(--text-muted);text-transform:capitalize;line-height:1.3;}
@media(max-width:640px){.dash-profile-txt,.dash-daterange{display:none;}}

/* ═══ BANNER ═══ */
.dash-banner{
  display:flex;align-items:center;gap:16px;padding:18px 22px;border-radius:16px;margin-bottom:28px;
  background:linear-gradient(120deg, rgba(245,158,11,.14), rgba(245,158,11,.04) 60%), var(--bg-card);
  border:1px solid rgba(245,158,11,.28);
  box-shadow:0 12px 30px -16px rgba(245,158,11,.25);
}
.dash-banner-ic{width:42px;height:42px;border-radius:12px;background:rgba(245,158,11,.16);color:var(--warning);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dash-banner-ic svg{width:21px;height:21px;}
.dash-banner-txt{flex:1;min-width:180px;}
.dash-banner-title{font-size:13.5px;font-weight:700;color:var(--text-main);}
.dash-banner-sub{font-size:11.5px;color:var(--text-secondary);margin-top:2px;}
.dash-banner-btn{background:var(--warning);color:#1A1200;font-weight:800;font-size:12px;padding:9px 18px;border-radius:10px;border:none;cursor:pointer;white-space:nowrap;transition:filter .15s,transform .15s;}
.dash-banner-btn:hover{filter:brightness(1.08);transform:translateY(-1px);}

/* ═══ METRIC CARDS ═══ */
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(216px,1fr));gap:20px;margin-bottom:32px;}
.mcard{
  background:linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,0) 45%), var(--bg-card);
  border:1px solid var(--border-soft);border-radius:16px;padding:20px 22px;
  box-shadow:0 1px 1px rgba(0,0,0,.2), 0 16px 36px -22px rgba(0,0,0,.55);
  transition:transform .2s var(--ease), box-shadow .2s var(--ease), border-color .2s var(--ease);
  display:flex;flex-direction:column;gap:14px;
}
[data-theme="light"] .mcard{box-shadow:0 1px 2px rgba(16,24,40,.04), 0 14px 28px -20px rgba(16,24,40,.16);}
.mcard:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.14);box-shadow:0 1px 1px rgba(0,0,0,.2), 0 24px 46px -20px rgba(0,0,0,.6);}
.mcard-top{display:flex;align-items:flex-start;justify-content:space-between;}
.mcard-ic{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;}
.mcard-ic svg{width:19px;height:19px;position:relative;z-index:1;}
.mcard-ic::after{content:'';position:absolute;inset:0;border-radius:11px;filter:blur(10px);opacity:.55;background:inherit;z-index:0;}
.ic-green{background:linear-gradient(135deg,#16A34A,#22C55E);color:#fff;}
.ic-orange{background:linear-gradient(135deg,#EA580C,#F97316);color:#fff;}
.ic-blue{background:linear-gradient(135deg,#1D4ED8,#3B82F6);color:#fff;}
.ic-purple{background:linear-gradient(135deg,#6D28D9,#8B5CF6);color:#fff;}
.ic-pink{background:linear-gradient(135deg,#DB2777,#EC4899);color:#fff;}
.ic-violet{background:linear-gradient(135deg,#7C3AED,#A78BFA);color:#fff;}
.mcard-lbl{font-size:11px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.mcard-val{font-size:25px;font-weight:800;color:var(--text-main);letter-spacing:-.5px;line-height:1;}
.mcard-foot{display:flex;align-items:center;gap:7px;flex-wrap:wrap;font-size:11px;}
.mcard-trend{display:inline-flex;align-items:center;gap:3px;font-weight:800;padding:2px 7px 2px 6px;border-radius:999px;}
.mcard-trend.up{color:var(--success);background:var(--success-soft);}
.mcard-trend.down{color:var(--danger);background:var(--danger-soft);}
.mcard-trend svg{width:10px;height:10px;}
.mcard-foot-txt{color:var(--text-muted);}

/* ═══ CHART ═══ */
.chart-wrap{position:relative;width:100%;height:200px;}
.chart-wrap svg{width:100%;height:100%;display:block;overflow:visible;}
.chart-grid{stroke:var(--border-color);stroke-width:1;stroke-dasharray:3 4;}
.chart-dot{fill:var(--bg-card);stroke:var(--primary);stroke-width:2;opacity:0;transition:opacity .2s;}
.chart-line{filter:drop-shadow(0 2px 6px rgba(37,99,235,.4));}
.chart-guide{stroke:var(--border-color);stroke-width:1;transition:opacity .12s;}
.chart-active-dot{fill:var(--primary);stroke:var(--bg-card);stroke-width:2.5;transition:opacity .12s;filter:drop-shadow(0 2px 6px rgba(37,99,235,.6));}
.chart-overlay{fill:transparent;cursor:crosshair;}
.chart-tooltip{position:absolute;transform:translate(-50%,-115%);background:var(--bg-card-2);border:1px solid var(--border-soft);border-radius:10px;padding:8px 12px;font-size:11px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .12s;box-shadow:0 12px 28px -10px rgba(0,0,0,.5);z-index:5;}
.ct-date{color:var(--text-muted);font-weight:600;margin-bottom:2px;}
.ct-val{color:var(--text-main);font-weight:800;font-size:13px;}
.chart-labels{display:flex;position:relative;height:16px;margin-top:6px;}
.chart-lbl{position:absolute;transform:translateX(-50%);font-size:10px;color:var(--text-muted);white-space:nowrap;}
.chart-axis-max{position:absolute;top:0;left:0;font-size:10px;color:var(--text-muted);font-weight:600;}

/* ═══ STATUS LIST ═══ */
.status-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;font-size:12.5px;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 3px currentColor;}
.status-row-lbl{flex:1;color:var(--text-secondary);font-weight:500;}
.status-row-val{font-weight:800;color:var(--text-main);min-width:16px;text-align:right;}
.hbar-track{background:var(--bg-main);border-radius:999px;height:7px;position:relative;margin-bottom:16px;overflow:hidden;}
[data-theme="light"] .hbar-track{background:var(--bg-section);}
.hbar-fill{height:100%;border-radius:999px;width:0;transition:width .7s var(--ease);}

/* ═══ TOP PRODUCTS ═══ */
.tp-row{display:flex;align-items:center;gap:13px;padding:11px 8px;border-radius:12px;transition:background .15s;}
.tp-row:hover{background:rgba(255,255,255,.03);}
[data-theme="light"] .tp-row:hover{background:rgba(15,23,42,.03);}
.tp-img{width:44px;height:44px;border-radius:11px;background:var(--bg-card-2);border:1px solid var(--border-soft);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.tp-img img{width:100%;height:100%;object-fit:contain;padding:4px;}
.tp-img svg{width:18px;height:18px;color:var(--text-muted);}
.tp-info{flex:1;min-width:0;}
.tp-name{font-size:12.5px;font-weight:700;color:var(--text-main);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tp-cat{font-size:10.5px;color:var(--text-muted);margin-top:1px;}
.tp-bar-wrap{width:100px;flex-shrink:0;}
.tp-bar-track{height:6px;border-radius:999px;background:var(--bg-main);overflow:hidden;}
[data-theme="light"] .tp-bar-track{background:var(--bg-section);}
.tp-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--primary),var(--primary-light));width:0;transition:width .7s var(--ease);}
.tp-qty{font-size:11.5px;font-weight:800;color:var(--text-main);width:46px;flex-shrink:0;text-align:right;}

/* ═══ EMPTY STATE ═══ */
.dempty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:38px 20px;color:var(--text-muted);gap:12px;}
.dempty svg{width:52px;height:52px;color:var(--text-muted);opacity:.5;}
.dempty-title{font-size:13px;font-weight:700;color:var(--text-secondary);}
.dempty-sub{font-size:11.5px;color:var(--text-muted);}

/* ═══ LOW STOCK LIST ═══ */
.lowstock-row{display:flex;align-items:center;justify-content:space-between;padding:11px 4px;border-bottom:1px solid var(--border-soft);font-size:12.5px;gap:10px;}
.lowstock-row:last-child{border-bottom:none;}
.lowstock-name{color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ═══ FINANCE MINI CARDS ═══ */
.fin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;}
.fin-card{border-radius:13px;padding:16px;border:1px solid var(--border-soft);background:var(--bg-card-2);transition:transform .18s var(--ease),box-shadow .18s var(--ease);}
.fin-card:hover{transform:translateY(-2px);box-shadow:0 14px 28px -16px rgba(0,0,0,.5);}
.fin-ic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.fin-ic svg{width:15px;height:15px;}
.fin-val{font-size:18px;font-weight:800;color:var(--text-main);letter-spacing:-.3px;}
.fin-lbl{font-size:10.5px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:5px;}

/* ═══ TIMELINE ═══ */
.tl{position:relative;}
.tl-item{display:flex;gap:13px;padding-bottom:20px;position:relative;}
.tl-item:last-child{padding-bottom:0;}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:14px;top:30px;bottom:0;width:1px;background:var(--border-soft);}
.tl-dot{width:29px;height:29px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;z-index:1;border:2px solid var(--bg-card);}
.tl-dot svg{width:13px;height:13px;}
.tl-body{flex:1;min-width:0;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding-top:2px;}
.tl-title{font-size:12.5px;font-weight:700;color:var(--text-main);}
.tl-meta{font-size:11px;color:var(--text-muted);margin-top:2px;}
.tl-right{text-align:right;flex-shrink:0;}
.tl-time{font-size:10.5px;color:var(--text-muted);margin-top:5px;}
</style>
</head>
<body>

<div class="admin-shell">
  <div id="admin-sidebar-mount"></div>
  <div class="admin-main">
    <div class="admin-topbar dash-topbar">
      <div>
        <div class="dash-topbar-title">Dashboard</div>
        <div class="dash-topbar-sub">Visão geral da sua loja 👋</div>
      </div>
      <div class="dash-topbar-right">
        <div class="period-tabs" id="periodTabs">
          <button data-key="7d" class="active">7 dias</button>
          <button data-key="30d">30 dias</button>
          <button data-key="90d">90 dias</button>
        </div>
        <div class="adr-wrap" id="dateRangeMount"></div>
        <div class="dash-search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="dashSearchInput" placeholder="Buscar produtos, pedidos, clientes..." autocomplete="off">
          <div class="dash-search-results" id="dashSearchResults"></div>
        </div>
        <button class="dash-icon-btn" id="dashBellBtn" title="Notificações">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="dash-badge" id="dashBellBadge" data-notif-badge hidden>0</span>
        </button>
        <a class="btn btn-primary dash-quickbtn" href="admin-produtos.html">+ Novo Produto</a>
        <div class="dash-profile" id="dashProfile">
          <div class="dash-avatar" id="dashAvatar">AD</div>
          <div class="dash-profile-txt">
            <div class="dash-profile-name" id="dashProfileName">Admin</div>
            <div class="dash-profile-role" id="dashProfileRole">Loja Alfa</div>
          </div>
        </div>
      </div>
    </div>
    <div class="admin-content dash-content">
      <div class="admin-insight-bar" id="admin-insight-bar" style="display:none"></div>

      <div id="dashBannerWrap"></div>

      <div class="mgrid dfade" id="metricsGrid"></div>

      <div class="dgrid-2">
        <div class="dcard dfade">
          <div class="dcard-head">
            <div>
              <div class="dcard-title" id="revChartTitle">Receita</div>
              <div class="dcard-sub">Últimos dias, pedidos pagos</div>
            </div>
          </div>
          <div class="chart-wrap" id="revChartWrap">
            <span class="chart-axis-max" id="chartAxisMax"></span>
            <svg id="revChartSvg" viewBox="0 0 640 170" preserveAspectRatio="none"></svg>
            <div class="chart-tooltip" id="chartTooltip"></div>
          </div>
          <div class="chart-labels" id="revChartLabels"></div>
        </div>
        <div class="dcard dfade">
          <div class="dcard-title">Pedidos por Status</div>
          <div id="statusChart" style="margin-top:16px;"></div>
        </div>
      </div>

      <div class="dgrid-2">
        <div class="dcard dfade">
          <div class="dcard-head">
            <div class="dcard-title">Produtos Mais Vendidos</div>
            <a class="dcard-link" href="admin-produtos.html">Ver todos <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></a>
          </div>
          <div id="topProductsChart"></div>
        </div>
        <div class="dcard dfade">
          <div class="dcard-head">
            <div>
              <div class="dcard-title">Estoque Baixo / Sem Estoque</div>
              <div class="dcard-sub" id="estoqueSub"></div>
            </div>
            <a class="dcard-link" href="admin-estoque.html">Ver estoque <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></a>
          </div>
          <div id="lowStockList" style="margin-top:8px;"></div>
        </div>
      </div>

      <div class="dgrid-2">
        <div class="dcard dfade">
          <div class="dcard-head">
            <div>
              <div class="dcard-title">Resumo Financeiro</div>
              <div class="dcard-sub" id="finSub">No período selecionado</div>
            </div>
          </div>
          <div class="fin-grid" id="finGrid"></div>
        </div>

function fmtBRL(v) { return 'R$ ' + Number(v || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }
function fmtDate(d) { return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' }); }

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const min = Math.floor(diff / 60000);
  if (min < 1) return 'agora';
  if (min < 60) return 'há ' + min + ' min';
  const h = Math.floor(min / 60);
  if (h < 24) return 'há ' + h + 'h';
  const d = Math.floor(h / 24);
  if (d < 30) return 'há ' + d + (d === 1 ? ' dia' : ' dias');
  return new Date(iso).toLocaleDateString('pt-BR');
}

/* ── trend helper ── */
function trend(curr, prev) {
  if (!prev) return curr > 0 ? { isNew: true, up: true } : null;
  const pct = (curr - prev) / prev * 100;
  return { pct, up: pct >= 0 };
}
function trendHtml(t, suffix) {
  if (!t) return suffix ? `<span class="mcard-foot-txt">${suffix}</span>` : '';
  const cls = t.up ? 'up' : 'down';
  const icon = t.up ? ICON.chevUp : ICON.chevDown;
  const label = t.isNew ? 'novo' : Math.abs(t.pct).toFixed(1) + '%';
  return `<span class="mcard-trend ${cls}">${icon}${label}</span>` + (suffix ? `<span class="mcard-foot-txt">${suffix}</span>` : '');
}

function mcard(icClass, icon, lbl, val, footHtml) {
  return `<div class="mcard">
    <div class="mcard-top">
      <div class="mcard-ic ${icClass}">${icon}</div>
    </div>
    <div><div class="mcard-lbl">${lbl}</div><div class="mcard-val">${val}</div></div>
    <div class="mcard-foot">${footHtml || ''}</div>
  </div>`;
}

function smoothPath(points) {
  if (points.length < 2) return `M ${points[0].x} ${points[0].y} L ${points[0].x} ${points[0].y}`;
  let d = `M ${points[0].x} ${points[0].y}`;
  for (let i = 0; i < points.length - 1; i++) {
    const p0 = points[i], p1 = points[i + 1];
    const cx = (p0.x + p1.x) / 2;
    d += ` C ${cx} ${p0.y}, ${cx} ${p1.y}, ${p1.x} ${p1.y}`;
  }
  return d;
}

async function loadDashboard() {
  if (!currentRange) return;
  const now = new Date();
  const since = currentRange.start;
  const until = currentRange.end;
  const spanMs = until.getTime() - since.getTime();
  const prevPeriodStart = new Date(since.getTime() - spanMs - 1);
  const prevPeriodEnd = new Date(since.getTime() - 1);
  const startOfToday = new Date(now); startOfToday.setHours(0, 0, 0, 0);
  const startOfYesterday = new Date(startOfToday.getTime() - 86400000);
  const startOfMonth = new Date(now); startOfMonth.setDate(1); startOfMonth.setHours(0, 0, 0, 0);
  const startOfLastMonth = new Date(startOfMonth); startOfLastMonth.setMonth(startOfLastMonth.getMonth() - 1);

  const [ordersRes, allOrdersRes, productsRes, categoriesRes, clientsRes, itemsRes, recentRes, movRes] = await Promise.all([
    window.sb.from('orders').select('id,total,status,created_at,discount,freight').gte('created_at', since.toISOString()).lte('created_at', until.toISOString()),
    window.sb.from('orders').select('id,total,status,created_at'),
    window.sb.from('products').select('id,name,stock,min_stock,active,cost_price,images,category_id'),
    window.sb.from('categories').select('id,nome'),
    window.sb.from('profiles').select('id,created_at').eq('role', 'cliente'),
    window.sb.from('order_items').select('order_id,product_id,product_name_snapshot,qty,unit_price,cost_price_snapshot'),
    window.sb.from('orders').select('id,order_number,total,status,created_at,profiles(full_name)').order('created_at', { ascending: false }).limit(8),
    window.sb.from('estoque_movimentacoes').select('product_id,tipo,quantidade,created_at').order('created_at', { ascending: false }).limit(20),
  ]);

  const orders = ordersRes.data || [];
  const allOrders = allOrdersRes.data || [];
  const products = productsRes.data || [];
  const categories = categoriesRes.data || [];
  const clients = clientsRes.data || [];
  const items = itemsRes.data || [];
  const recent = recentRes.data || [];
  const stockMovs = movRes.data || [];

  const catMap = {}; categories.forEach(c => catMap[c.id] = c.nome);
  const prodMap = {}; products.forEach(p => prodMap[p.id] = p);

  const isPaid = o => !['aguardando_pagamento', 'cancelado'].includes(o.status);
  const isPending = o => o.status === 'aguardando_pagamento';

  const revenueToday = allOrders.filter(o => isPaid(o) && new Date(o.created_at) >= startOfToday).reduce((s, o) => s + Number(o.total), 0);
  const revenueYesterday = allOrders.filter(o => isPaid(o) && new Date(o.created_at) >= startOfYesterday && new Date(o.created_at) < startOfToday).reduce((s, o) => s + Number(o.total), 0);
  const revenueMonth = allOrders.filter(o => isPaid(o) && new Date(o.created_at) >= startOfMonth).reduce((s, o) => s + Number(o.total), 0);
  const revenueLastMonth = allOrders.filter(o => isPaid(o) && new Date(o.created_at) >= startOfLastMonth && new Date(o.created_at) < startOfMonth).reduce((s, o) => s + Number(o.total), 0);

  const paidOrders = allOrders.filter(isPaid);
  const ticketMedio = paidOrders.length ? paidOrders.reduce((s, o) => s + Number(o.total), 0) / paidOrders.length : 0;
  const prevWindowOrders = allOrders.filter(o => new Date(o.created_at) >= prevPeriodStart && new Date(o.created_at) < since);
  const prevWindowPaid = prevWindowOrders.filter(isPaid);
  const prevTicketMedio = prevWindowPaid.length ? prevWindowPaid.reduce((s, o) => s + Number(o.total), 0) / prevWindowPaid.length : 0;

  const pendingOrders = allOrders.filter(isPending);
  const pendingTotal = pendingOrders.reduce((s, o) => s + Number(o.total), 0);

  const lowStock = products.filter(p => p.stock > 0 && p.stock <= p.min_stock);
  const noStock = products.filter(p => p.stock <= 0);

  const newClientsPeriod = clients.filter(c => new Date(c.created_at) >= since).length;
  const newClientsPrevPeriod = clients.filter(c => new Date(c.created_at) >= prevPeriodStart && new Date(c.created_at) < since).length;

  /* ── banner ── */
  const bannerWrap = document.getElementById('dashBannerWrap');
  if (pendingOrders.length) {
    bannerWrap.innerHTML = `<div class="dash-banner dfade">
      <div class="dash-banner-ic">${ICON.alertTriangle}</div>
      <div class="dash-banner-txt">
        <div class="dash-banner-title">${pendingOrders.length} pedido${pendingOrders.length !== 1 ? 's' : ''} aguardando pagamento</div>
        <div class="dash-banner-sub">${fmtBRL(pendingTotal)} em vendas pendentes de confirmação</div>
      </div>
      <button class="dash-banner-btn" onclick="location.href='admin-pedidos.html'">Ver pedidos</button>
    </div>`;
  } else {
    bannerWrap.innerHTML = '';
  }

  /* ── metric cards ── */
  document.getElementById('metricsGrid').innerHTML = [
    mcard('ic-green', ICON.wallet, 'Receita Hoje', fmtBRL(revenueToday), trendHtml(trend(revenueToday, revenueYesterday)) + '<span class="mcard-foot-txt">vs ontem</span>'),
    mcard('ic-green', ICON.trending, 'Receita do Mês', fmtBRL(revenueMonth), trendHtml(trend(revenueMonth, revenueLastMonth)) + '<span class="mcard-foot-txt">vs mês anterior</span>'),
    mcard('ic-violet', ICON.cart, 'Vendas Pendentes', pendingOrders.length, pendingOrders.length ? `<span class="mcard-foot-txt">${fmtBRL(pendingTotal)} aguardando</span>` : '<span class="mcard-foot-txt">Nenhuma pendente</span>'),
    mcard('ic-orange', ICON.bag, 'Pedidos', orders.length, trendHtml(trend(orders.length, prevWindowOrders.length)) + '<span class="mcard-foot-txt">vs período anterior</span>'),
    mcard('ic-pink', ICON.tag, 'Ticket Médio', fmtBRL(ticketMedio), trendHtml(trend(ticketMedio, prevTicketMedio)) + '<span class="mcard-foot-txt">vs período anterior</span>'),
    mcard('ic-blue', ICON.users, 'Clientes', clients.length, trendHtml(trend(newClientsPeriod, newClientsPrevPeriod)) + `<span class="mcard-foot-txt">${newClientsPeriod} novo${newClientsPeriod !== 1 ? 's' : ''} no período</span>`),
    mcard('ic-purple', ICON.box, 'Produtos', products.length, `<span class="mcard-foot-txt">${lowStock.length + noStock.length} com estoque baixo/zerado</span>`),
  ].join('');

  renderRevenueChart(orders);
  renderStatusChart(orders);
  renderTopProducts(items, orders, prodMap, catMap);
  renderLowStock(lowStock, noStock, products, stockMovs);
  renderFinance(orders, items, products, isPaid);
  renderTimeline(recent);
}

function renderRevenueChart(orders) {
  document.getElementById('revChartTitle').textContent = 'Receita — ' + currentRange.label;
  const since = currentRange.start, until = currentRange.end;
  const spanDays = Math.round((until - since) / 86400000) + 1;
  const weekly = spanDays > 60;

  const days = [];
  if (weekly) {
    let cur = new Date(since);
    while (cur <= until) {
      const bStart = new Date(cur);
      const bEnd = new Date(Math.min(bStart.getTime() + 6 * 86400000, until.getTime()));
      days.push({ from: bStart, to: bEnd, lbl: bStart.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }), total: 0 });
      cur = new Date(bEnd.getTime() + 86400000);
    }
  } else {
    for (let d = new Date(since); d <= until; d = new Date(d.getTime() + 86400000)) {
      const bStart = new Date(d); bStart.setHours(0, 0, 0, 0);
      const bEnd = new Date(d); bEnd.setHours(23, 59, 59, 999);
      days.push({ from: bStart, to: bEnd, lbl: bStart.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }), total: 0 });
    }
  }
  orders.forEach(o => {
    if (o.status === 'aguardando_pagamento' || o.status === 'cancelado') return;
    const t = new Date(o.created_at).getTime();
    const bucket = days.find(d => t >= d.from.getTime() && t <= d.to.getTime());
    if (bucket) bucket.total += Number(o.total);
  });

  const W = 640, H = 170, padTop = 14, padBottom = 8;
  const max = Math.max(...days.map(d => d.total), 1);
  const n = days.length;
  const points = days.map((d, i) => ({
    x: n === 1 ? W / 2 : (i / (n - 1)) * W,
    y: padTop + (H - padTop - padBottom) * (1 - d.total / max),
    d,
  }));
  const linePath = smoothPath(points);
  const areaPath = linePath + ` L ${points[n - 1].x} ${H} L ${points[0].x} ${H} Z`;

  document.getElementById('chartAxisMax').textContent = fmtBRL(max).replace(',00', '');

  const svg = document.getElementById('revChartSvg');
  svg.innerHTML = `
    <defs>
      <linearGradient id="revGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#2563EB" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${[0.25, 0.5, 0.75].map(f => `<line x1="0" y1="${padTop + (H - padTop - padBottom) * f}" x2="${W}" y2="${padTop + (H - padTop - padBottom) * f}" class="chart-grid"/>`).join('')}
    <path d="${areaPath}" fill="url(#revGrad)" stroke="none"/>
    <path id="chartLinePath" d="${linePath}" fill="none" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="chart-line"/>
    ${points.map(p => `<circle cx="${p.x}" cy="${p.y}" r="3" class="chart-dot"/>`).join('')}
    <line id="chartGuide" x1="0" y1="0" x2="0" y2="${H}" class="chart-guide" style="opacity:0"/>
    <circle id="chartActiveDot" r="4.5" class="chart-active-dot" style="opacity:0"/>
    <rect x="0" y="0" width="${W}" height="${H}" class="chart-overlay" id="chartOverlay"/>
  `;

  const linePathEl = document.getElementById('chartLinePath');
  const len = linePathEl.getTotalLength();
  linePathEl.style.strokeDasharray = len;
  linePathEl.style.strokeDashoffset = len;
  void linePathEl.getBoundingClientRect();
  linePathEl.style.transition = 'stroke-dashoffset .9s cubic-bezier(.4,0,.2,1)';
  requestAnimationFrame(() => { linePathEl.style.strokeDashoffset = '0'; });

  const showEvery = days.length > 14 ? Math.ceil(days.length / 14) : 1;
  document.getElementById('revChartLabels').innerHTML = days.map((d, i) =>
    `<span class="chart-lbl" style="left:${n === 1 ? 50 : (i / (n - 1)) * 100}%">${i % showEvery === 0 ? d.lbl : ''}</span>`
  ).join('');

  const tooltip = document.getElementById('chartTooltip');
  const guide = document.getElementById('chartGuide');
  const activeDot = document.getElementById('chartActiveDot');
  function handleMove(clientX) {
    const rect = svg.getBoundingClientRect();
    let frac = (clientX - rect.left) / rect.width;
    frac = Math.min(1, Math.max(0, frac));
    const idx = Math.round(frac * (n - 1));
    const p = points[idx];
    guide.setAttribute('x1', p.x); guide.setAttribute('x2', p.x); guide.style.opacity = 1;
    activeDot.setAttribute('cx', p.x); activeDot.setAttribute('cy', p.y); activeDot.style.opacity = 1;
    tooltip.style.left = (p.x / W * 100) + '%';
    tooltip.style.top = (p.y / H * 100) + '%';
    tooltip.innerHTML = `<div class="ct-date">${p.d.lbl}</div><div class="ct-val">${fmtBRL(p.d.total)}</div>`;
    tooltip.style.opacity = 1;
  }
  const overlay = document.getElementById('chartOverlay');
  overlay.onmousemove = e => handleMove(e.clientX);
  overlay.ontouchmove = e => { if (e.touches[0]) handleMove(e.touches[0].clientX); };
  overlay.onmouseleave = () => { guide.style.opacity = 0; activeDot.style.opacity = 0; tooltip.style.opacity = 0; };
}

function renderStatusChart(orders) {
  const counts = {};
  Object.keys(STATUS_LABELS).forEach(k => counts[k] = 0);
  orders.forEach(o => { counts[o.status] = (counts[o.status] || 0) + 1; });
  const max = Math.max(...Object.values(counts), 1);
  const el = document.getElementById('statusChart');
  el.innerHTML = Object.entries(STATUS_LABELS).map(([key, label]) => `
    <div class="status-row">
      <span class="status-dot" style="background:${STATUS_HEX[key]};color:${STATUS_HEX[key]}22"></span>
      <span class="status-row-lbl">${label}</span>
      <span class="status-row-val">${counts[key]}</span>
    </div>
    <div class="hbar-track"><div class="hbar-fill" data-w="${counts[key] / max * 100}" style="background:linear-gradient(90deg,${STATUS_HEX[key]}99,${STATUS_HEX[key]})"></div></div>
  `).join('');
  requestAnimationFrame(() => {
    el.querySelectorAll('.hbar-fill').forEach(b => { b.style.width = b.dataset.w + '%'; });
  });
}

function renderTopProducts(items, periodOrders, prodMap, catMap) {
  const statusMap = {}; periodOrders.forEach(o => statusMap[o.id] = o.status);
  const totals = {};
  items.forEach(it => {
    const status = statusMap[it.order_id];
    if (status === undefined || status === 'cancelado') return;
    const key = it.product_id;
    if (!totals[key]) totals[key] = { qty: 0, name: it.product_name_snapshot, product_id: key };
    totals[key].qty += it.qty;
  });
  const top = Object.values(totals).sort((a, b) => b.qty - a.qty).slice(0, 6);
  const el = document.getElementById('topProductsChart');
  if (!top.length) {
    el.innerHTML = `<div class="dempty">${ICON.emptyBox}<div class="dempty-title">Nenhuma venda no período</div><div class="dempty-sub">Os produtos mais vendidos aparecem aqui.</div></div>`;
    return;
  }
  const max = Math.max(...top.map(t => t.qty), 1);
  el.innerHTML = top.map(t => {
    const p = prodMap[t.product_id];
    const img = p && p.images && p.images[0] ? `<img src="${p.images[0]}" alt="">` : ICON.box;
    const cat = p && p.category_id && catMap[p.category_id] ? catMap[p.category_id] : 'Sem categoria';
    return `<div class="tp-row">
      <div class="tp-img">${img}</div>
      <div class="tp-info"><div class="tp-name" title="${t.name}">${t.name}</div><div class="tp-cat">${cat}</div></div>
      <div class="tp-bar-wrap"><div class="tp-bar-track"><div class="tp-bar-fill" data-w="${t.qty / max * 100}"></div></div></div>
      <div class="tp-qty">${t.qty} un.</div>
    </div>`;
  }).join('');
  requestAnimationFrame(() => {
    el.querySelectorAll('.tp-bar-fill').forEach(b => { b.style.width = b.dataset.w + '%'; });
  });
}

function renderLowStock(lowStock, noStock, products, stockMovs) {
  const valorEstoque = products.reduce((s, p) => s + (p.stock > 0 ? p.stock * Number(p.cost_price || 0) : 0), 0);
  const ultimaRepo = stockMovs.find(m => m.tipo === 'reposicao' || m.tipo === 'entrada_manual');
  const subParts = ['Valor em estoque: ' + fmtBRL(valorEstoque)];
  if (ultimaRepo) subParts.push('Última reposição: ' + timeAgo(ultimaRepo.created_at));
  document.getElementById('estoqueSub').textContent = subParts.join(' · ');

  const el = document.getElementById('lowStockList');
  const list = [...noStock.map(p => ({ ...p, tag: 'Sem estoque', color: 'red' })), ...lowStock.map(p => ({ ...p, tag: 'Estoque baixo', color: 'amber' }))].slice(0, 8);
  if (!list.length) {
    el.innerHTML = `<div class="dempty">${ICON.check}<div class="dempty-title">Nenhum produto com estoque baixo</div><div class="dempty-sub">Seu estoque está sob controle. 🎉</div></div>`;
    return;
  }
  el.innerHTML = list.map(p => `
    <div class="lowstock-row">
      <span class="lowstock-name" title="${p.name}">${p.name}</span>
      <span class="status-pill ${p.color}">${p.tag} (${p.stock})</span>
    </div>`).join('');
}

function renderFinance(orders, items, products, isPaid) {
  const productCostMap = {}; products.forEach(p => productCostMap[p.id] = Number(p.cost_price) || 0);
  const periodPaidIds = new Set(orders.filter(isPaid).map(o => o.id));
  let cogs = 0;
  items.forEach(it => {
    if (!periodPaidIds.has(it.order_id)) return;
    const cost = it.cost_price_snapshot != null ? Number(it.cost_price_snapshot) : (productCostMap[it.product_id] || 0);
    cogs += cost * it.qty;
  });
  const paid = orders.filter(isPaid);
  const faturamento = paid.reduce((s, o) => s + Number(o.total), 0);
  const descontos = paid.reduce((s, o) => s + Number(o.discount || 0), 0);
  const frete = paid.reduce((s, o) => s + Number(o.freight || 0), 0);
  const lucroBruto = faturamento - cogs;

  document.getElementById('finSub').textContent = currentRange.label + ', pedidos pagos';
  document.getElementById('finGrid').innerHTML = [
    { ic: 'ic-blue', icon: ICON.wallet, val: fmtBRL(faturamento), lbl: 'Faturamento' },
    { ic: 'ic-orange', icon: ICON.percent, val: fmtBRL(descontos), lbl: 'Descontos' },
    { ic: 'ic-violet', icon: ICON.truckSm, val: fmtBRL(frete), lbl: 'Frete' },
    { ic: 'ic-green', icon: ICON.trending, val: fmtBRL(lucroBruto), lbl: 'Lucro Bruto' },
  ].map(f => `<div class="fin-card"><div class="fin-ic ${f.ic}">${f.icon}</div><div class="fin-val">${f.val}</div><div class="fin-lbl">${f.lbl}</div></div>`).join('');
}

function renderTimeline(recent) {
  const el = document.getElementById('timeline');
  if (!recent.length) {
    el.innerHTML = `<div class="dempty">${ICON.clock}<div class="dempty-title">Nenhuma atividade ainda</div></div>`;
    return;
  }
  el.innerHTML = recent.map(o => {
    const color = STATUS_HEX[o.status] || '#8B8D96';
    const name = (o.profiles && o.profiles.full_name) || 'Cliente';
    return `<div class="tl-item">
      <div class="tl-dot" style="background:${color}22;color:${color}">${STATUS_ICON[o.status] || ICON.box}</div>
      <div class="tl-body">
        <div>
          <div class="tl-title">Pedido #${o.order_number || o.id}</div>
          <div class="tl-meta">${name} • ${fmtBRL(o.total)}</div>
        </div>
        <div class="tl-right">
          <span class="status-pill ${o.status === 'entregue' ? 'green' : o.status === 'cancelado' ? 'red' : o.status === 'aguardando_pagamento' ? 'amber' : 'blue'}">${STATUS_LABELS[o.status] || o.status}</span>
          <div class="tl-time">${timeAgo(o.created_at)}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ── busca global ── */
const SEARCH_ICON = {
  produtos: ICON.box,
  categorias: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="8" height="8"/><rect x="13" y="3" width="8" height="8"/><rect x="3" y="13" width="8" height="8"/><rect x="13" y="13" width="8" height="8"/></svg>',
  clientes: ICON.users,
  pedidos: ICON.bag,
  cupons: ICON.tag,
};

function mountDashSearch() {
  const input = document.getElementById('dashSearchInput');
  const results = document.getElementById('dashSearchResults');
  let timer = null;

  async function doSearch(rawQ) {
    const q = rawQ.replace(/[,()%]/g, ' ').trim();
    if (!q) { results.classList.remove('open'); results.innerHTML = ''; return; }

    const [prodRes, catRes, cliRes, pedRes, cupRes] = await Promise.all([
      window.sb.from('products').select('id,name,brand,sku').or(`name.ilike.%${q}%,brand.ilike.%${q}%,sku.ilike.%${q}%`).limit(5),
      window.sb.from('categories').select('id,nome').ilike('nome', `%${q}%`).limit(5),
      window.sb.from('profiles').select('id,full_name,email').eq('role', 'cliente').or(`full_name.ilike.%${q}%,email.ilike.%${q}%`).limit(5),
      window.sb.from('orders').select('id,order_number,total').ilike('order_number', `%${q}%`).limit(5),
      window.sb.from('cupons').select('id,codigo').ilike('codigo', `%${q}%`).limit(5),
    ]);

    const groups = [
      { label: 'Produtos', icon: SEARCH_ICON.produtos, items: (prodRes.data || []).map(p => ({ main: p.name, sub: p.brand || p.sku || '', href: 'admin-produtos.html?q=' + encodeURIComponent(p.name) })) },
      { label: 'Categorias', icon: SEARCH_ICON.categorias, items: (catRes.data || []).map(c => ({ main: c.nome, sub: 'Categoria', href: 'admin-categorias.html?q=' + encodeURIComponent(c.nome) })) },
      { label: 'Clientes', icon: SEARCH_ICON.clientes, items: (cliRes.data || []).map(c => ({ main: c.full_name || c.email, sub: c.email || '', href: 'admin-clientes.html?q=' + encodeURIComponent(c.full_name || c.email || '') })) },
      { label: 'Pedidos', icon: SEARCH_ICON.pedidos, items: (pedRes.data || []).map(o => ({ main: '#' + (o.order_number || o.id), sub: fmtBRL(o.total), href: 'admin-pedidos.html?q=' + encodeURIComponent(o.order_number || '') })) },
      { label: 'Cupons', icon: SEARCH_ICON.cupons, items: (cupRes.data || []).map(c => ({ main: c.codigo, sub: 'Cupom', href: 'admin-cupons.html?q=' + encodeURIComponent(c.codigo) })) },
    ].filter(g => g.items.length);

    if (!groups.length) {
      results.innerHTML = `<div class="dsr-empty">Nenhum resultado pra "${q}"</div>`;
      results.classList.add('open');
      return;
    }
    results.innerHTML = groups.map(g => `
      <div class="dsr-group-lbl">${g.label}</div>
      ${g.items.map(it => `<div class="dsr-item" data-href="${it.href}">
        <div class="dsr-item-ic">${g.icon}</div>
        <div class="dsr-item-txt"><div class="dsr-item-main">${it.main}</div><div class="dsr-item-sub">${it.sub}</div></div>
      </div>`).join('')}
    `).join('');
    results.classList.add('open');
  }

  input.addEventListener('input', () => {
    clearTimeout(timer);
    const q = input.value;
    timer = setTimeout(() => doSearch(q), 250);
  });
  input.addEventListener('focus', () => { if (results.innerHTML) results.classList.add('open'); });
  document.addEventListener('click', (e) => { if (!e.target.closest('.dash-search')) results.classList.remove('open'); });
  results.addEventListener('click', (e) => {
    const item = e.target.closest('.dsr-item');
    if (item) location.href = item.dataset.href;
  });
}

document.getElementById('periodTabs').addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn || !dateRangeCtl) return;
  dateRangeCtl.setKey(btn.dataset.key);
});
function positionNotifPanel() {
  const bell = document.getElementById('dashBellBtn');
  const panel = document.getElementById('notifPanel');
  if (!bell || !panel) return;
  const rect = bell.getBoundingClientRect();
  panel.style.right = Math.max(12, window.innerWidth - rect.right) + 'px';
}
document.getElementById('dashBellBtn').addEventListener('click', () => {
  positionNotifPanel();
  if (window.AdminShell && AdminShell.toggleNotifications) AdminShell.toggleNotifications();
  else location.href = 'admin-notificacoes.html';
});
window.addEventListener('resize', positionNotifPanel);

(async function () {
  const session = await AdminShell.init('dashboard');
  if (!session) return;
  const p = session.profile;
  const initials = (p.full_name || p.email || 'A').split(' ').slice(0, 2).map(s => s[0]).join('').toUpperCase();
  document.getElementById('dashAvatar').textContent = initials;
  document.getElementById('dashProfileName').textContent = p.full_name || p.email;
  document.getElementById('dashProfileRole').textContent = p.role;
  document.getElementById('dashProfile').addEventListener('click', () => location.href = 'admin-equipe.html');

  dateRangeCtl = AdminDateRange.mount(document.getElementById('dateRangeMount'), (range) => {
    currentRange = range;
    document.querySelectorAll('#periodTabs button').forEach(b => b.classList.toggle('active', b.dataset.key === range.key));
    loadDashboard();
  }, { initialKey: '7d' });

  if (typeof mountDashSearch === 'function') mountDashSearch();
})();
</script>
